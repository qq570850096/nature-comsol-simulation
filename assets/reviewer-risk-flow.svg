<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Reviewer-risk audit flow</title>
  <desc id="desc">Flow diagram showing how simulation evidence is checked for numerical trust, physical trust, claim tier, and publication output.</desc>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <style>
    .title{font:700 28px Arial, sans-serif;fill:#0f172a}
    .subtitle{font:400 15px Arial, sans-serif;fill:#475569}
    .h{font:700 16px Arial, sans-serif;fill:#0f172a}
    .b{font:400 13px Arial, sans-serif;fill:#334155}
    .s{font:400 12px Arial, sans-serif;fill:#64748b}
    .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.3;rx:12}
    .check{fill:#eef2ff;stroke:#4f46e5;stroke-width:1.3;rx:12}
    .tier{fill:#fff7ed;stroke:#ea580c;stroke-width:1.3;rx:12}
    .out{fill:#ecfdf5;stroke:#059669;stroke-width:1.3;rx:12}
    .arrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .tagHigh{fill:#fee2e2;stroke:#dc2626;rx:9}
    .tagMed{fill:#fef3c7;stroke:#d97706;rx:9}
    .tagLow{fill:#dcfce7;stroke:#16a34a;rx:9}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="50" y="48" class="title">Reviewer-risk audit flow</text>
  <text x="50" y="74" class="subtitle">The skill checks whether the manuscript claim is stronger than the COMSOL/FEA evidence.</text>

  <rect x="50" y="125" width="195" height="230" class="box"/>
  <text x="75" y="160" class="h">1. Input evidence</text>
  <text x="75" y="200" class="b">Geometry</text>
  <text x="75" y="225" class="b">Materials</text>
  <text x="75" y="250" class="b">Boundary conditions</text>
  <text x="75" y="275" class="b">Mesh</text>
  <text x="75" y="300" class="b">Solver</text>
  <text x="75" y="325" class="b">Validation / benchmark</text>

  <path d="M245 240 H300" class="arrow"/>

  <rect x="300" y="125" width="205" height="230" class="check"/>
  <text x="325" y="160" class="h">2. Numerical trust</text>
  <text x="325" y="200" class="b">Mesh convergence</text>
  <text x="325" y="225" class="b">Time-step convergence</text>
  <text x="325" y="250" class="b">Solver tolerance</text>
  <text x="325" y="275" class="b">Contact/coupling stability</text>
  <text x="325" y="300" class="b">Failed-case reporting</text>

  <path d="M505 240 H560" class="arrow"/>

  <rect x="560" y="125" width="205" height="230" class="check"/>
  <text x="585" y="160" class="h">3. Physical trust</text>
  <text x="585" y="200" class="b">Material provenance</text>
  <text x="585" y="225" class="b">BC realism</text>
  <text x="585" y="250" class="b">Sensitivity analysis</text>
  <text x="585" y="275" class="b">Calibration data</text>
  <text x="585" y="300" class="b">Experimental validation</text>

  <path d="M765 240 H820" class="arrow"/>

  <rect x="820" y="125" width="155" height="230" class="tier"/>
  <text x="845" y="160" class="h">4. Claim tier</text>
  <text x="845" y="202" class="b">Observation</text>
  <text x="845" y="229" class="b">Inference</text>
  <text x="845" y="256" class="b">Mechanism</text>
  <text x="845" y="283" class="b">Design claim</text>
  <text x="845" y="310" class="b">Real-world claim</text>

  <path d="M975 240 H1030" class="arrow"/>

  <rect x="1030" y="125" width="120" height="230" class="out"/>
  <text x="1052" y="160" class="h">5. Output</text>
  <text x="1050" y="203" class="b">Text</text>
  <text x="1050" y="230" class="b">Risks</text>
  <text x="1050" y="257" class="b">Fixes</text>
  <text x="1050" y="284" class="b">Checklist</text>
  <text x="1050" y="311" class="b">Figures</text>

  <rect x="160" y="420" width="880" height="120" class="box"/>
  <text x="185" y="455" class="h">Risk flags returned to the author</text>
  <rect x="185" y="480" width="250" height="36" class="tagHigh"/>
  <text x="205" y="503" class="b">High: central claim unsupported</text>
  <rect x="475" y="480" width="250" height="36" class="tagMed"/>
  <text x="495" y="503" class="b">Medium: fixable reporting gap</text>
  <rect x="765" y="480" width="250" height="36" class="tagLow"/>
  <text x="785" y="503" class="b">Low: presentation/traceability</text>
  <text x="185" y="560" class="s">The audit keeps strong manuscript language only when model evidence supports it.</text>
</svg>
